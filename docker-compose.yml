# ============================================
# ShopWise - Docker Compose
# Orchestration des services
# ============================================

version: '3.8'

services:
  # ===================
  # Base de données MySQL
  # ===================
  db:
    image: mysql:8.0
    container_name: shopwise-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-shopwise}
      MYSQL_USER: ${MYSQL_USER:-shopwise}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-shopwise_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./bdd/script.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - shopwise-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===================
  # Backend Spring Boot
  # ===================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME:-shopwise}/shopwise-backend:${VERSION:-latest}
    container_name: shopwise-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:mysql://db:3306/shopwise?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DATABASE_USER: ${MYSQL_USER:-shopwise}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-shopwise_password}
      CORS_ORIGINS: http://localhost:80,http://localhost:4200
    ports:
      - "8080:8080"
    networks:
      - shopwise-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===================
  # Frontend Angular + Nginx
  # ===================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME:-shopwise}/shopwise-frontend:${VERSION:-latest}
    container_name: shopwise-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - shopwise-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ===================
# Volumes persistants
# ===================
volumes:
  mysql_data:
    driver: local

# ===================
# Réseau
# ===================
networks:
  shopwise-network:
    driver: bridge
