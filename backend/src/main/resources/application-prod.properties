# Production Configuration
server.port=8080

# Database Configuration - MySQL
spring.datasource.url=${DATABASE_URL:jdbc:mysql://db:3306/shopwise?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USER:shopwise}
spring.datasource.password=${DATABASE_PASSWORD:shopwise_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable H2 Console in production
spring.h2.console.enabled=false

# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:80,http://localhost:4200}

# Logging
logging.level.com.shopwise=INFO
logging.level.org.springframework.web=WARN

# Actuator for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
